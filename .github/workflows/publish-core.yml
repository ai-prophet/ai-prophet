name: Publish ai-prophet-core

on:
  workflow_dispatch:
    inputs:
      repository:
        description: "Where to publish this release"
        required: true
        default: testpypi
        type: choice
        options:
          - testpypi
          - pypi

permissions:
  contents: read

concurrency:
  group: publish-ai-prophet-core-${{ inputs.repository }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: python -m pip install --upgrade pip build twine pytest

      - name: Show package version
        run: |
          python - <<'PY'
          import tomllib

          with open("packages/core/pyproject.toml", "rb") as file:
              version = tomllib.load(file)["project"]["version"]

          print(f"ai-prophet-core {version}")
          PY

      - name: Fail if version already exists on target index
        env:
          TARGET_INDEX: ${{ inputs.repository }}
        run: |
          python - <<'PY'
          import os
          import tomllib
          import urllib.error
          import urllib.request

          package = "ai-prophet-core"
          with open("packages/core/pyproject.toml", "rb") as file:
              version = tomllib.load(file)["project"]["version"]

          base_url = {
              "pypi": "https://pypi.org/pypi",
              "testpypi": "https://test.pypi.org/pypi",
          }[os.environ["TARGET_INDEX"]]
          url = f"{base_url}/{package}/{version}/json"

          try:
              with urllib.request.urlopen(url) as response:
                  if response.status == 200:
                      raise SystemExit(
                          f"{package} {version} already exists on {os.environ['TARGET_INDEX']}"
                      )
          except urllib.error.HTTPError as exc:
              if exc.code != 404:
                  raise

          print(f"{package} {version} is available for upload to {os.environ['TARGET_INDEX']}")
          PY

      - name: Install package
        run: python -m pip install -e packages/core

      - name: Run tests
        run: pytest packages/core/tests

      - name: Build distributions
        working-directory: packages/core
        run: python -m build

      - name: Check distributions
        working-directory: packages/core
        run: python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: ai-prophet-core-dist
          path: packages/core/dist/*
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ inputs.repository }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: ai-prophet-core-dist
          path: dist

      - name: Publish to TestPyPI
        if: inputs.repository == 'testpypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          repository-url: https://test.pypi.org/legacy/

      - name: Publish to PyPI
        if: inputs.repository == 'pypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
