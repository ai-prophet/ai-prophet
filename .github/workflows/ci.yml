name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            packages/core/pyproject.toml
            packages/cli/pyproject.toml

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "packages/cli[dev]"

      - name: Run Ruff
        run: python -m ruff check --config packages/cli/pyproject.toml packages/core packages/cli

  test:
    name: Test (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            packages/core/pyproject.toml
            packages/cli/pyproject.toml

      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "packages/core[mcp]" -e "packages/cli[dev]"

      - name: Run core tests
        run: pytest packages/core/tests

      - name: Run CLI tests
        run: pytest packages/cli/tests
