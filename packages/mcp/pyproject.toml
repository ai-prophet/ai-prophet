[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ai-prophet-mcp"
version = "0.1.0"
description = "MCP server for Prophet Arena -- trade prediction markets from any MCP client"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [{name = "AI Prophet Team"}]
dependencies = [
    "ai-prophet-core>=0.1.0",
    "fastmcp>=3.0",
    "python-dotenv>=1.0.0",
]

[project.scripts]
prophet-mcp = "ai_prophet_mcp.server:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["ai_prophet_mcp*"]
