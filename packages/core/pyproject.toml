[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ai-prophet-core"
version = "0.1.0"
description = "Prophet Arena SDK core types and HTTP client"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [{name = "Simon Mahns"}]
dependencies = [
    "pydantic>=2.0",
    "httpx>=0.27",
    "jsonschema>=4.0",
]

[project.urls]
Homepage = "https://www.prophetarena.co"
Documentation = "https://www.prophetarena.co"

[tool.setuptools.packages.find]
where = ["."]
include = ["ai_prophet_core*"]

[tool.setuptools.package-data]
"ai_prophet_core" = ["py.typed"]
"ai_prophet_core.schemas" = ["*.schema.json"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
