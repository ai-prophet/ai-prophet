steps:
  # в”Ђв”Ђ Build & push comparison worker image в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -f
      - services/worker/Dockerfile.comparison
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/ai-prophet-worker-comparison:latest
      - .

  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/ai-prophet-worker-comparison:latest

  # в”Ђв”Ђ Deploy GPT-5.4 comparison worker в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    args:
      - gcloud
      - run
      - worker-pools
      - deploy
      - comparison-gpt5
      - --image=us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/ai-prophet-worker-comparison:latest
      - --region=us-west1
      - --set-env-vars=TRADING_INSTANCE_NAME=GPT5,COMPARISON_MODEL=openai:gpt-5.4:market,COMPARISON_SOURCE_INSTANCE=Haifeng,COMPARISON_STARTING_CASH=10000,COMPARISON_POLL_INTERVAL_SEC=3600,LIVE_BETTING_ENABLED=true,LIVE_BETTING_DRY_RUN=true,PREDICTOR_SERVICE_URL=https://predictor-comparison-kalzyydawq-uw.a.run.app,KALSHI_API_KEY_ID=$$KALSHI_API_KEY_ID,KALSHI_PRIVATE_KEY_B64=$$KALSHI_PRIVATE_KEY_B64,DATABASE_URL=$$DATABASE_URL,OPENAI_API_KEY=$$OPENAI_API_KEY,KALSHI_BASE_URL=https://api.elections.kalshi.com

  # в”Ђв”Ђ Deploy Grok 4 comparison worker в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    args:
      - gcloud
      - run
      - worker-pools
      - deploy
      - comparison-grok4
      - --image=us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/ai-prophet-worker-comparison:latest
      - --region=us-west1
      - --set-env-vars=TRADING_INSTANCE_NAME=Grok4,COMPARISON_MODEL=grok:grok-4:market,COMPARISON_SOURCE_INSTANCE=Haifeng,COMPARISON_STARTING_CASH=10000,COMPARISON_POLL_INTERVAL_SEC=3600,LIVE_BETTING_ENABLED=true,LIVE_BETTING_DRY_RUN=true,PREDICTOR_SERVICE_URL=https://predictor-comparison-kalzyydawq-uw.a.run.app,KALSHI_API_KEY_ID=$$KALSHI_API_KEY_ID,KALSHI_PRIVATE_KEY_B64=$$KALSHI_PRIVATE_KEY_B64,DATABASE_URL=$$DATABASE_URL,XAI_API_KEY=$$XAI_API_KEY,KALSHI_BASE_URL=https://api.elections.kalshi.com

  # в”Ђв”Ђ Deploy Claude Opus 4.6 comparison worker в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    args:
      - gcloud
      - run
      - worker-pools
      - deploy
      - comparison-opus46
      - --image=us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/ai-prophet-worker-comparison:latest
      - --region=us-west1
      - --set-env-vars=TRADING_INSTANCE_NAME=Opus46,COMPARISON_MODEL=anthropic:claude-opus-4-6:market,COMPARISON_SOURCE_INSTANCE=Haifeng,COMPARISON_STARTING_CASH=10000,COMPARISON_POLL_INTERVAL_SEC=3600,LIVE_BETTING_ENABLED=true,LIVE_BETTING_DRY_RUN=true,PREDICTOR_SERVICE_URL=https://predictor-comparison-kalzyydawq-uw.a.run.app,KALSHI_API_KEY_ID=$$KALSHI_API_KEY_ID,KALSHI_PRIVATE_KEY_B64=$$KALSHI_PRIVATE_KEY_B64,DATABASE_URL=$$DATABASE_URL,ANTHROPIC_API_KEY=$$ANTHROPIC_API_KEY,KALSHI_BASE_URL=https://api.elections.kalshi.com

images:
  - "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/ai-prophet-worker-comparison:latest"
