steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/predictor', '.']
    dir: 'services/predictor'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/predictor']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      - 'gcloud'
      - 'run'
      - 'deploy'
      - 'predictor'
      - '--image=gcr.io/$PROJECT_ID/predictor'
      - '--region=us-west1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=1Gi'
      - '--timeout=300s'
      - '--concurrency=80'
      - '--min-instances=1'
      - '--max-instances=5'
      - '--set-env-vars=XAI_API_KEY=$$XAI_API_KEY,GOOGLE_API_KEY_HAIFENG=$$GEMINI_API_KEY_HAIFENG,GOOGLE_API_KEY_JIBANG=$$GEMINI_API_KEY_JIBANG,OPENAI_API_KEY=$$OPENAI_API_KEY,ANTHROPIC_API_KEY=$$ANTHROPIC_API_KEY'
